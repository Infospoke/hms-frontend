<div class="container">
    <app-heading-container [heading]="'Dashboard'" [fontSize]="'1.4rem'"></app-heading-container>

    <div class="main-job-content">

        <div class="main-job-card-content">
            <div class="card-content" *ngFor="let item of list">
                <div class="card-content-body">
                    <div class="left">
                        <div class="icon">
                            <i [class]="item.icon"></i>
                        </div>
                        <h6 class="text">{{item.title}}</h6>
                    </div>
                    <p>{{item.count}}</p>
                </div>
            </div>
        </div>


        <div class="dashboard-layout">

            <div class="left-section">

                <!-- Hiring -->
                <div class="jobs-card">
                    <div class="hire-heading">
                        <app-heading-container [heading]="'Hiring Dashboard'" [fontSize]="'1.4rem'"
                            [subHeading]="'A holistic view of jobs, pipeline movement, and candidate progress'"
                            [subHeadingFontSize]="'1rem'">
                        </app-heading-container>

                        <button class="btn btn-outline-primary">
                            <span></span>Live Updates
                        </button>
                    </div>

                    <div class="job-scroll-wrapper">
                        <button class="scroll-btn left" (click)="scrollLeft()">&#10094;</button>

                        <div class="job-list" #jobList>
                            <div class="job-details" *ngFor="let job of jobsListData">
                                <app-jobs-card [job]="job" [isActive]="job?.jobId===selectedJobId"
                                    (selectedJob)="handleSelectedJob($event)" [width]="'400px'">
                                </app-jobs-card>
                            </div>
                        </div>

                        <button class="scroll-btn right" (click)="scrollRight()">&#10095;</button>
                    </div>
                </div>

                <!-- Pipeline -->
                <div class="jobs-card pipe-line">
                    <div class="hire-heading">
                        <app-heading-container [heading]="'Pipeline Funnel'" [fontSize]="'1.4rem'"
                            [subHeading]="selectedJob?.jobTitle" [subHeadingFontSize]="'1rem'">
                        </app-heading-container>

                        <button class="btn btn-outline-primary">Conversion 18%</button>
                    </div>

                    <div class="stages-list">
                        <div class="helper" *ngFor="let item of stages">
                            <app-pipe-line-cards [stage]="item"></app-pipe-line-cards>
                        </div>
                    </div>
                </div>

            </div>


            <div class="job-activity-card">
                <app-heading-container [heading]="'Activity Feed'" [fontSize]="'1.4rem'">
                </app-heading-container>

                <div class="activity-body">
                    <div class="activity-list">
                        <div class="activity-item" *ngFor="let log of activityLogs">

                            <!-- DOT -->
                            <div class="dot"></div>

                            <!-- CONTENT -->
                            <div class="activity-content">
                                <p class="message">
                                    <strong>{{log.user}}</strong> {{log.action}}
                                </p>
                                <span class="time">{{log.time}}</span>
                            </div>

                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>
</div>
