<div class="rt-container">

 
  <div class="rt-header" *ngIf="title">
    <h2 class="rt-title">{{ title }}</h2>
  </div>

 
  <div class="rt-scroll-wrapper">
    <table class="rt-table" role="table">

     
      <thead *ngIf="showHeader">
        <tr>
          <th
            *ngFor="let col of columns"
            [style.width]="col.width || 'auto'"
            [class.rt-th--sortable]="isSortable(col.key)"
            [class.rt-th--sorted]="activeSortCol === col.key"
            [class.hide-mobile]="col.hideOnMobile"
            [attr.aria-sort]="activeSortCol === col.key ? activeSortDir : null"
            (click)="onSort(col.key)"
          >
            <span class="rt-th-inner" [class.rt-th-inner--right]="col.align === 'right'" [class.rt-th-inner--center]="col.align === 'center'">
              {{ col.label }}

              <span class="rt-sort-icon" *ngIf="isSortable(col.key)" aria-hidden="true">
                <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
                  <path
                    d="M6 2L9 5H3L6 2Z"
                    [class.rt-sort-active]="activeSortCol === col.key && activeSortDir === 'asc'"
                    fill="currentColor"
                  />
                  <path
                    d="M6 10L3 7H9L6 10Z"
                    [class.rt-sort-active]="activeSortCol === col.key && activeSortDir === 'desc'"
                    fill="currentColor"
                  />
                </svg>
              </span>
            </span>
          </th>
        </tr>
      </thead>

    
      <tbody>


        <tr *ngIf="data.length === 0" class="rt-empty-row">
          <td [attr.colspan]="columns.length">
            <div class="rt-empty-state">
              <svg width="40" height="40" viewBox="0 0 40 40" fill="none" aria-hidden="true">
                <rect x="6" y="10" width="28" height="22" rx="3" stroke="#cbd5e1" stroke-width="1.5" fill="none"/>
                <path d="M6 16h28" stroke="#cbd5e1" stroke-width="1.5"/>
                <path d="M13 23h6M13 27h10" stroke="#cbd5e1" stroke-width="1.5" stroke-linecap="round"/>
              </svg>
              <p>{{ emptyMessage }}</p>
            </div>
          </td>
        </tr>

        <tr
          *ngFor="let row of data; let even = even"
          class="rt-row"
          [class.rt-row--even]="even"
          (click)="rowClick.emit(row)"
          role="row"
        >
          <td
            *ngFor="let col of columns"
            [class.hide-mobile]="col.hideOnMobile"
            [class.rt-td--center]="col.align === 'center'"
            [class.rt-td--right]="col.align === 'right'"
            role="cell"
          >
           
            <ng-container
              *ngIf="col.custom && cellTemplate; else defaultCell"
              [ngTemplateOutlet]="cellTemplate"
              [ngTemplateOutletContext]="{ $implicit: { row: row, col: col } }"
            ></ng-container>


            <ng-template #defaultCell>
              <span class="rt-cell-text">{{ getCellValue(row, col.key) }}</span>
            </ng-template>
          </td>
        </tr>

      </tbody>
    </table>
  </div>


  <div class="rt-footer" *ngIf="showPagination || totalItems > 0">

    <app-pagination
      *ngIf="showPagination"
      [totalItems]="totalItems"
      [pageSize]="pageSize"
      [currentPage]="currentPage"
      [maxVisiblePages]="maxVisiblePages"
      (pageChange)="onPageChange($event)"
    ></app-pagination>
  </div>

</div>
