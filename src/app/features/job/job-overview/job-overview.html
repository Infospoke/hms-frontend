<div class="container">
    <div class="top-bar">
        <div class="tabs">
            <button class="tab active">Job Overview</button>
            <button class="tab">Applicants</button>
        </div>

        <button class="create-btn">
            + Create Job
        </button>
    </div>
    <div class="jobs-container-data">
        <div class="jobs-list">
            <div class="jobs-top">
                <span>Jobs</span>
                <button class="filter-btn">
                    <i class="fa-solid fa-filter"></i>
                    Filter
                </button>
            </div>
            <div class="all-jobs">
                 <app-job (selectedJobIdChange)="handleSelectedJob($event)"/>
            </div>  
        </div>
        <div class="jobs-overview">
            <div class="stages-list">
                <div class="helper" *ngFor="let item of stages">
                    <app-pipe-line-cards [stage]="item" [height]="'100px'"></app-pipe-line-cards>
                </div>
            </div>
            <app-view-job [job]="selectedJob"/>
        </div>
    </div>
</div>
