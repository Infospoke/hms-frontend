<div class="sidebar">
  <div class="nav">
    <ng-container *ngFor="let item of navItems">
      <div
        class="item"
        [class.active]="item.path ? isActive(item.path) : openMenu === item.id"
        (click)="toggleMenu(item)">
        <i [class]="item.icon"></i>
        <span>{{ item.label }}</span>
        <i *ngIf="item.children?.length"
           class="fa-solid fa-chevron-right chevron"
    [class.open]="openMenu === item.id">
        </i>
      </div>

      <!-- FIRST-LEVEL CHILDREN -->
      <div *ngIf="item.children?.length && openMenu === item.id" class="sub-group">
        <ng-container *ngFor="let child of item.children">

          <!-- Child with nested children (acts as accordion) -->
          <div *ngIf="child.children?.length; else leafChild"
               class="sub sub-parent"
               [class.active-sub]="openNested === child.label"
               (click)="toggleNested(child)">
            <i [class]="child.icon + ' sub-icon'"></i>
            <span>{{ child.label }}</span>
            <i class="fa-solid fa-chevron-right chevron-sm"
               [class.open]="openNested === child.label">
            </i>
          </div>

          <!-- Nested grandchildren -->
          <div *ngIf="child.children?.length && openNested === child.label" class="sub-group nested">
            <div *ngFor="let grand of child.children"
                 class="sub nested-sub"
                 [class.active-sub]="isActive(grand.path)"
                 (click)="navigate(grand.path)">
              <i [class]="grand.icon + ' sub-icon sm'"></i>
              <span>{{ grand.label }}</span>
            </div>
          </div>

          <!-- Plain leaf child -->
          <ng-template #leafChild>
            <div class="sub"
                 [class.active-sub]="isActive(child.path)"
                 (click)="navigate(child.path)">
              <i [class]="child.icon + ' sub-icon'"></i>
              <span>{{ child.label }}</span>
            </div>
          </ng-template>

        </ng-container>
      </div>

    </ng-container>
  </div>
</div>
