<div class="cr-page">

  <!-- ══ PAGE HEADING ══ -->
  <div class="cr-heading">
    <h1 class="cr-heading-title">Create Role</h1>
    <p class="cr-heading-sub">Add role details to create a new role in the system.</p>
  </div>

  <!-- ══ ROLE INFORMATION CARD ══ -->
  <div class="cr-info-card">
    <h3 class="cr-section-title">Role Information</h3>

    <form [formGroup]="form">

      <!-- Row 1: Business Unit + Department -->
      <div class="form-row two-col">
        <div class="form-group">
          <label class="form-label">Business Unit <span class="astrick">*</span></label>
          <select formControlName="businessUnit"
            [class.is-invalid]="isFieldInvalid('businessUnit')">
            <option value="" disabled>Select Business Unit</option>
            <option *ngFor="let u of businessUnits" [value]="u.id ?? u">
              {{ u.name ?? u }}
            </option>
          </select>
          <small class="err-msg" *ngIf="isFieldInvalid('businessUnit')">
            Business Unit is required.
          </small>
        </div>

        <div class="form-group">
          <label class="form-label">Department <span class="astrick">*</span></label>
          <select formControlName="department"
            [class.is-invalid]="isFieldInvalid('department')">
            <option value="" disabled>Select Department</option>
            <option *ngFor="let d of departments" [value]="d.id ?? d">
              {{ d.name ?? d }}
            </option>
          </select>
          <small class="err-msg" *ngIf="isFieldInvalid('department')">
            Department is required.
          </small>
        </div>
      </div>

      <div class="form-row two-col">
        <div class="form-group">
          <label class="form-label">Role Name <span class="astrick">*</span></label>
          <input type="text" placeholder="Enter role name"
            formControlName="roleName"
            [class.is-invalid]="isFieldInvalid('roleName')" />
          <small class="err-msg" *ngIf="isFieldInvalid('roleName')">
            Role Name is required.
          </small>
        </div>

        <div class="form-group">
          <label class="form-label">Description <span class="astrick">*</span></label>
          <input type="text" placeholder="Enter role description"
            formControlName="description"
            [class.is-invalid]="isFieldInvalid('description')" />
          <small class="err-msg" *ngIf="isFieldInvalid('description')">
            Description is required.
          </small>
        </div>
      </div>

    </form>
  </div>


  <div class="cr-perm-card">
    <app-permissions-panel
      [allModules]="allModules"
      [permMap]="permMap"
      [loading]="loading"
      [viewMode]="false"
      [touched]="permTouched"
      (permChange)="onPermChange($event)"
    ></app-permissions-panel>
  </div>

  <div class="cr-footer">
    <button class="btn btn-ghost" type="button" (click)="cancel()">
      Cancel
    </button>
    <button class="btn btn-primary-2" type="button"
      [disabled]="isSubmitting" (click)="submit()">
      <span *ngIf="!isSubmitting">Submit</span>
      <span *ngIf="isSubmitting">
        <i class="fa-solid fa-spinner fa-spin"></i>&nbsp;Saving...
      </span>
    </button>
  </div>

</div>
