<span
  [style.color]="textColor"
  [style.backgroundColor]="bgColor"
  [style.borderColor]="borderColor",
  [ngClass]="{ 'active': isActive }"
  style="display:inline-flex;
         align-items:center;
         justify-content:center;
         padding:6px 12px;
         border-radius:999px;
         font-size:13px;
         font-weight:500;
         cursor:pointer;
         transition:all 0.2s ease;
         border:1.5px solid;
         white-space:nowrap;
         line-height:1;
         height:32px;
         box-sizing:border-box;" (click)="handleSelectedCard()">
  {{ label }}<span *ngIf="count" style="margin-left:5px; opacity:0.75;">({{ count }})</span>
</span>
