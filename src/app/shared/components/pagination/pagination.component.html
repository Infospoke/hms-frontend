<div class="pagination-wrapper" *ngIf="totalPages > 0">
  
    <span class="pagination-info">
        Page <strong>{{ currentPage }}</strong> of <strong>{{ totalPages }}</strong>
        &nbsp;
       
    </span>


    <div class="pagination-controls">
   
        <button class="page-btn nav-btn" [class.disabled]="currentPage === 1" [disabled]="currentPage === 1"
            (click)="prev()" aria-label="Previous page">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                <path d="M10 12L6 8L10 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"
                    stroke-linejoin="round" />
            </svg>
        </button>


        <ng-container *ngFor="let page of pages">
            <button *ngIf="!isEllipsis(page); else ellipsisTpl" class="page-btn" [class.active]="page === currentPage"
                (click)="goTo(page)" [attr.aria-label]="'Page ' + page"
                [attr.aria-current]="page === currentPage ? 'page' : null">
                {{ page }}
            </button>

            <ng-template #ellipsisTpl>
                <span class="page-ellipsis">…</span>
            </ng-template>
        </ng-container>


        <button class="page-btn nav-btn" [class.disabled]="currentPage === totalPages"
            [disabled]="currentPage === totalPages" (click)="next()" aria-label="Next page">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                <path d="M6 4L10 8L6 12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"
                    stroke-linejoin="round" />
            </svg>
        </button>
    </div>
</div>
