<div class="topbar">
  <div class="logo">NEXUS</div>

  <app-search-bar class="search-flex"></app-search-bar>

  <div class="top-right tr">


    <div class="notification" (click)="openNotifications()">
      <i class="fa-solid fa-bell"></i>
      <span class="notif-count" *ngIf="notificationCount > 0">
        {{ notificationCount }}
      </span>
    </div>

    <!-- Role Badge -->
    <span class="role-badge">
      <app-card [label]="roleName" [textColor]="'var(--badge-ta-text)'" [bgColor]="'var(--badge-ta-bg)'">
      </app-card>
    </span>


    <div nz-dropdown [nzDropdownMenu]="menu" nzTrigger="click">
      <div class="avatar av">
        {{ userName | profile }}
      </div>
    </div>

    <nz-dropdown-menu #menu="nzDropdownMenu">
      <ul nz-menu class="custom-menu">

        <li nz-menu-item (click)="goToProfile()">
          <i class="fa-solid fa-user-circle menu-icon profile"></i>
          <span>My Profile</span>
        </li>

        <li nz-menu-item (click)="changePassword()">
          <i class="fa-solid fa-lock menu-icon password"></i>
          <span>Change Password</span>
        </li>

        <li nz-menu-divider></li>

        <li nz-menu-item (click)="logout()" class="logout-item">
          <i class="fa-solid fa-right-from-bracket menu-icon logout"></i>
          <span>Logout</span>
        </li>

      </ul>
    </nz-dropdown-menu>

  </div>
</div>
